<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./src/output.css">
</head>
<body>
    
<header class="w-full bg-white px-8 py-5 flex items-center justify-between shadow-sm font-sans">
    <!-- Логотип или пустой блок слева -->
    <div></div>

    <!-- Ссылки навигации -->
    <ul class="flex items-center gap-10 text-gray-700 font-medium">
        <li><a href="#" class="hover:text-[#2ba873] transition-colors">Booking</a></li>
        <li><a href="#" class="hover:text-[#2ba873] transition-colors">Facilities</a></li>
        <li><a href="#" class="hover:text-[#2ba873] transition-colors">About Us</a></li>
        <li><a href="#" class="hover:text-[#2ba873] transition-colors">Location</a></li>
        <li><a href="#" class="hover:text-[#2ba873] transition-colors">Contact</a></li>
    </ul>

    <!-- Кнопка Login справа -->
    <div>
        <button class="bg-[#2ba873] text-white px-8 py-2.5 rounded-full font-medium hover:bg-[#238c60] transition-colors">
            Login
        </button>
    </div>
</header>

<section class="w-full px-4 lg:px-0">
  <div class="relative w-full max-w-6xl mx-auto min-h-[600px] bg-[#f8fafb] flex flex-col lg:flex-row overflow-visible">
    
    <!-- Левая часть (текст) -->
    <div class="w-full lg:w-1/2 flex flex-col justify-center p-8 lg:px-16 z-10">
      <h1 class="text-4xl lg:text-6xl font-bold mb-6 text-gray-900">Find your perfect place to stay</h1>
      <p class="text-gray-500 mb-8 max-w-md">Lorem Ipsum is simply dummy text of the printing and typesetting industry.</p>
      
      <div class="flex items-center gap-4">
        <button class="w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-md">
          <svg class="w-6 h-6 text-green-500 fill-current" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <span class="font-medium text-gray-800">Watch video</span>
      </div>
    </div>
 
    <!-- Правая часть (изображение) -->
    <div class="w-full lg:w-1/2 relative h-64 lg:h-auto">
      <img src="./images/image (24).png" alt="House" class="w-full h-full object-cover">
    </div>
 
    <!-- Панель поиска (Адаптивная) -->
    <div class="lg:absolute lg:bottom-10 lg:left-1/2 lg:transform lg:-translate-x-1/2 w-full lg:w-[90%] bg-white rounded-3xl lg:rounded-full p-4 flex flex-col lg:flex-row items-center shadow-2xl z-20 gap-4 mt-4 lg:mt-0">
      <div class="flex-1 w-full px-6 lg:border-r border-gray-100">
        <p class="text-[10px] text-gray-400 uppercase font-bold">Location</p>
        <p class="font-semibold text-gray-800">United States</p>
      </div>
      <div class="flex-1 w-full px-6 lg:border-r border-gray-100">
        <p class="text-[10px] text-gray-400 uppercase font-bold">Check in</p>
        <p class="font-semibold text-gray-800">10 Jun 2021</p>
      </div>
      <div class="flex-1 w-full px-6 lg:border-r border-gray-100">
        <p class="text-[10px] text-gray-400 uppercase font-bold">Check out</p>
        <p class="font-semibold text-gray-800">15 Jun 2021</p>
      </div>
      <button class="bg-[#2ba873] text-white w-full lg:w-auto px-8 py-4 rounded-full flex items-center justify-center gap-2 font-semibold hover:bg-[#238c60]">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        Search
      </button>
    </div>
  </div>
</section>

</body>
</html>
