<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./src/output.css">
</head>
<body>
    
<header class="w-full bg-white px-8 py-5 flex items-center justify-between shadow-sm font-sans">
    <!-- Кнопка Login (как на макете слева) -->
    <div>
        <button class="bg-[#2ba873] text-white px-8 py-2.5 rounded-full font-medium hover:bg-[#238c60] transition-colors">
            Login
        </button>
    </div>

    <!-- Навигационные ссылки (справа) -->
    <ul class="hidden md:flex items-center gap-10 text-gray-700 font-medium">
        <li><a href="#" class="hover:text-[#2ba873] transition-colors">Booking</a></li>
        <li><a href="#" class="hover:text-[#2ba873] transition-colors">Facilities</a></li>
        <li><a href="#" class="hover:text-[#2ba873] transition-colors">About Us</a></li>
        <li><a href="#" class="hover:text-[#2ba873] transition-colors">Location</a></li>
        <li><a href="#" class="hover:text-[#2ba873] transition-colors">Contact</a></li>
    </ul>

    <!-- Мобильное меню (Гамбургер - видимый только на мобильных) -->
    <div class="md:hidden">
        <button class="text-gray-700 hover:text-[#2ba873]">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
            </svg>
        </button>
    </div>
</header>

</body>
</html>
